name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      mod-gtnh: ${{ steps.filter.outputs.mod-gtnh }}
      protocol: ${{ steps.filter.outputs.protocol }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'web/**'
            mod-gtnh:
              - 'mod/gtnh/**'
            protocol:
              - 'protocol/**'

  web:
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.protocol == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx vue-tsc --noEmit
      - run: npm run build:all

  mod-gtnh:
    needs: changes
    if: needs.changes.outputs.mod-gtnh == 'true' || needs.changes.outputs.protocol == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 8
          distribution: temurin
      - name: Build mod
        working-directory: mod/gtnh
        run: ./gradlew build
